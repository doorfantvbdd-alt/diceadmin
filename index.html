<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>Pit Control — Colour Dice</title>
<link rel="apple-touch-icon" sizes="180x180" href="admin-icon-180.png">
<link rel="apple-touch-icon" sizes="167x167" href="admin-icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="admin-icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="admin-icon-120.png">
<link rel="icon" type="image/png" sizes="1024x1024" href="admin-icon-1024.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root {
        --felt-dark: #0a2018;
        --felt-panel: #0f2c21;
        --felt-panel-raised: #123626;
        --brass: #c9a227;
        --brass-light: #e8c766;
        --brass-dim: rgba(201, 162, 39, 0.35);
        --cream: #f3ecd8;
        --mono-grey: #7c9c8b;
        --led-amber: #ffb238;
        --led-green: #3fe08a;
        --led-red: #ff5c5c;

        --die-red: #e6342b;
        --die-orange: #ff7a1a;
        --die-yellow: #ffcf33;
        --die-green: #29b84a;
        --die-blue: #2f5fe6;
        --die-purple: #8a3bef;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
        background:
            radial-gradient(ellipse at top, rgba(255,255,255,0.03), transparent 60%),
            var(--felt-dark);
        background-image:
            radial-gradient(ellipse at top, rgba(255,255,255,0.03), transparent 60%),
            repeating-linear-gradient(135deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px),
            linear-gradient(var(--felt-dark), var(--felt-dark));
        color: var(--cream);
        font-family: 'Inter', -apple-system, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: max(28px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(28px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
    }

    /* MARQUEE HEADER */
    .marquee {
        text-align: center;
        margin-bottom: 20px;
    }
    .marquee .eyebrow {
        font-family: 'Space Mono', monospace;
        font-size: 0.68rem;
        letter-spacing: 3px;
        color: var(--brass);
        text-transform: uppercase;
    }
    .marquee h1 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 2.6rem;
        letter-spacing: 3px;
        color: var(--cream);
        line-height: 1;
        margin-top: 4px;
        text-shadow: 0 0 18px rgba(201, 162, 39, 0.25);
    }
    .marquee p {
        font-size: 0.82rem;
        color: var(--mono-grey);
        margin-top: 8px;
        line-height: 1.5;
        max-width: 320px;
    }

    /* BRASS-FRAMED SESSION PLATE */
    .session-plate {
        width: 100%;
        max-width: 380px;
        background: var(--felt-panel);
        border: 1px solid var(--brass-dim);
        border-radius: 14px;
        padding: 16px;
        position: relative;
        margin-bottom: 16px;
        box-shadow: inset 0 0 0 1px rgba(0,0,0,0.3), 0 10px 30px rgba(0,0,0,0.35);
    }
    .session-plate::before, .session-plate::after,
    .rivet-tl, .rivet-tr, .rivet-bl, .rivet-br {
        content: '';
        position: absolute;
        width: 5px; height: 5px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, var(--brass-light), var(--brass) 60%, #6b5310 100%);
    }
    .rivet-tl { top: 7px; left: 7px; }
    .rivet-tr { top: 7px; right: 7px; }
    .rivet-bl { bottom: 7px; left: 7px; }
    .rivet-br { bottom: 7px; right: 7px; }

    .session-row { display: flex; gap: 8px; }
    input#session-input {
        flex: 1;
        min-width: 0;
        background: #081912;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 8px;
        padding: 13px 14px;
        color: var(--cream);
        font-family: 'Space Mono', monospace;
        font-size: 16px;
        outline: none;
        letter-spacing: 1px;
    }
    input#session-input:focus { border-color: var(--brass); }
    input#session-input::placeholder { color: rgba(124, 156, 139, 0.5); }

    button#connect-btn {
        background: linear-gradient(180deg, var(--brass-light), var(--brass));
        border: none;
        color: #201603;
        padding: 0 18px;
        border-radius: 8px;
        font-family: 'Space Mono', monospace;
        font-weight: 700;
        font-size: 0.78rem;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
        min-width: 84px;
    }
    button#connect-btn:active { transform: translateY(1px); }
    button#connect-btn:disabled { opacity: 0.6; }

    /* LED STATUS READOUT */
    .readout {
        margin-top: 12px;
        background: #050f0a;
        border: 1px solid rgba(0,0,0,0.4);
        border-radius: 8px;
        padding: 10px 12px;
        font-family: 'Space Mono', monospace;
        font-size: 0.78rem;
        text-align: center;
        color: var(--mono-grey);
        min-height: 18px;
        letter-spacing: 0.5px;
    }
    .readout.connected { color: var(--led-green); text-shadow: 0 0 8px rgba(63, 224, 138, 0.5); }
    .readout.error { color: var(--led-red); text-shadow: 0 0 8px rgba(255, 92, 92, 0.5); animation: flicker 0.4s ease; }
    @keyframes flicker {
        0%, 100% { opacity: 1; }
        40% { opacity: 0.3; }
        60% { opacity: 1; }
    }

    /* DIE CONTROL GRID */
    .die-grid {
        width: 100%;
        max-width: 380px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        opacity: 0.4;
        pointer-events: none;
        transition: opacity 0.3s;
        flex: 1;
    }
    .die-grid.active { opacity: 1; pointer-events: all; }

    .die-tile {
        --tile-color: #888;
        position: relative;
        aspect-ratio: 1 / 0.82;
        border-radius: 14px;
        border: 1px solid var(--brass-dim);
        background: var(--felt-panel-raised);
        overflow: hidden;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        perspective: 400px;
    }
    .die-tile:active .die-face { transform: scale(0.94); }

    .die-face {
        font-size: 2.6rem;
        line-height: 1;
        color: var(--tile-color);
        text-shadow: 0 0 16px color-mix(in srgb, var(--tile-color) 60%, transparent);
        transition: transform 0.12s;
    }
    .die-label {
        font-family: 'Space Mono', monospace;
        font-size: 0.66rem;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--mono-grey);
    }

    /* BRASS FLIP-COVER, drops down when a colour is blocked */
    .flip-cover {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, var(--brass-light), var(--brass) 55%, #7a611a);
        display: flex;
        align-items: center;
        justify-content: center;
        transform: rotateX(90deg);
        transform-origin: top;
        transition: transform 0.32s cubic-bezier(0.2, 0.9, 0.3, 1.3);
    }
    .die-tile.selected .flip-cover { transform: rotateX(0deg); }
    .flip-cover span {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.15rem;
        letter-spacing: 2px;
        color: #201603;
    }

    #clear-btn {
        margin-top: 16px;
        width: 100%;
        max-width: 380px;
        background: transparent;
        border: 1px solid var(--brass-dim);
        color: var(--brass-light);
        padding: 15px;
        border-radius: 10px;
        font-family: 'Space Mono', monospace;
        font-weight: 700;
        font-size: 0.78rem;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        cursor: pointer;
    }
    #clear-btn:active { transform: scale(0.98); }
</style>
</head>
<body>
    <div class="marquee">
        <div class="eyebrow">Colour Dice</div>
        <h1>Pit Control</h1>
        <p>Patch into a table's session, then lock out a colour before the next roll.</p>
    </div>

    <div class="session-plate">
        <div class="rivet-tl"></div><div class="rivet-tr"></div><div class="rivet-bl"></div><div class="rivet-br"></div>
        <div class="session-row">
            <input type="text" id="session-input" placeholder="SESSION ID" autocomplete="off" autocapitalize="none" autocorrect="off">
            <button id="connect-btn" onclick="connectSession()">Patch In</button>
        </div>
        <div class="readout" id="status-line">NOT CONNECTED</div>
    </div>

    <div class="die-grid" id="die-grid">
        <div class="die-tile" style="--tile-color: var(--die-red)" data-color="Red" onclick="blockColor('Red')">
            <div class="die-face">⚀</div>
            <div class="die-label">Red</div>
            <div class="flip-cover"><span>Blocked</span></div>
        </div>
        <div class="die-tile" style="--tile-color: var(--die-orange)" data-color="Orange" onclick="blockColor('Orange')">
            <div class="die-face">⚁</div>
            <div class="die-label">Orange</div>
            <div class="flip-cover"><span>Blocked</span></div>
        </div>
        <div class="die-tile" style="--tile-color: var(--die-yellow)" data-color="Yellow" onclick="blockColor('Yellow')">
            <div class="die-face">⚂</div>
            <div class="die-label">Yellow</div>
            <div class="flip-cover"><span>Blocked</span></div>
        </div>
        <div class="die-tile" style="--tile-color: var(--die-green)" data-color="Green" onclick="blockColor('Green')">
            <div class="die-face">⚃</div>
            <div class="die-label">Green</div>
            <div class="flip-cover"><span>Blocked</span></div>
        </div>
        <div class="die-tile" style="--tile-color: var(--die-blue)" data-color="Blue" onclick="blockColor('Blue')">
            <div class="die-face">⚄</div>
            <div class="die-label">Blue</div>
            <div class="flip-cover"><span>Blocked</span></div>
        </div>
        <div class="die-tile" style="--tile-color: var(--die-purple)" data-color="Purple" onclick="blockColor('Purple')">
            <div class="die-face">⚅</div>
            <div class="die-label">Purple</div>
            <div class="flip-cover"><span>Blocked</span></div>
        </div>
    </div>

    <button id="clear-btn" onclick="clearBlock()">Release Block</button>

    <script>
        const BACKEND_URL = 'https://dice-cheat-logger.onrender.com';
        let activeSession = null;
        let pollTimer = null;

        const sessionInput = document.getElementById('session-input');
        const connectBtn = document.getElementById('connect-btn');
        const statusLine = document.getElementById('status-line');
        const dieGrid = document.getElementById('die-grid');

        async function connectSession() {
            const value = sessionInput.value.trim();
            if (!value) {
                setStatus('ENTER A SESSION ID FIRST', 'error');
                return;
            }

            connectBtn.disabled = true;
            connectBtn.textContent = '...';
            setStatus('CHECKING TABLE...', '');

            try {
                const res = await fetch(`${BACKEND_URL}/check-session?session=${encodeURIComponent(value)}`);
                const data = await res.json();

                if (data.exists) {
                    activeSession = value;
                    setStatus(`CONNECTED — SESSION "${activeSession.toUpperCase()}"`, 'connected');
                    dieGrid.classList.add('active');
                    startPolling();
                } else {
                    activeSession = null;
                    dieGrid.classList.remove('active');
                    setStatus('SESSION ID NOT FOUND :(', 'error');
                    stopPolling();
                }
            } catch (e) {
                setStatus('COULD NOT REACH THE SERVER', 'error');
            } finally {
                connectBtn.disabled = false;
                connectBtn.textContent = 'Patch In';
            }
        }

        function setStatus(text, cls) {
            statusLine.textContent = text;
            statusLine.className = 'readout' + (cls ? ' ' + cls : '');
        }

        function startPolling() {
            stopPolling();
            pollTimer = setInterval(checkBlockStatus, 2000);
        }

        function stopPolling() {
            if (pollTimer) clearInterval(pollTimer);
            pollTimer = null;
        }

        async function checkBlockStatus() {
            if (!activeSession) return;
            const wasSelected = document.querySelector('.die-tile.selected');
            if (!wasSelected) return;

            try {
                const res = await fetch(`${BACKEND_URL}/block-status?session=${encodeURIComponent(activeSession)}`);
                const data = await res.json();

                if (!data.blockedColor) {
                    document.querySelectorAll('.die-tile').forEach(t => t.classList.remove('selected'));
                    setStatus('ROLL LOGGED — PICK AGAIN', 'connected');
                }
            } catch (e) {}
        }

        async function blockColor(color) {
            if (!activeSession) return;
            document.querySelectorAll('.die-tile').forEach(t => t.classList.remove('selected'));
            document.querySelector(`.die-tile[data-color="${color}"]`).classList.add('selected');

            try {
                await fetch(`${BACKEND_URL}/block-color`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session: activeSession, color })
                });
                setStatus(`"${color.toUpperCase()}" LOCKED FOR NEXT ROLL`, 'connected');
            } catch (e) {
                setStatus('COULD NOT REACH THE SERVER', 'error');
            }
        }

        async function clearBlock() {
            if (!activeSession) return;
            document.querySelectorAll('.die-tile').forEach(t => t.classList.remove('selected'));
            try {
                await fetch(`${BACKEND_URL}/block-color`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session: activeSession, color: null })
                });
                setStatus('BLOCK RELEASED', 'connected');
            } catch (e) {
                setStatus('COULD NOT REACH THE SERVER', 'error');
            }
        }
    </script>
</body>
</html>
